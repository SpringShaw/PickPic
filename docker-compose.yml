version: '3.8'

services:
  pickpic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pickpic
    restart: always
    network_mode: bridge
    ports:
      - "${PORT:-8082}:8082"
    volumes:
      # 图片源目录（宿主机路径，通过 .env 配置）
      - ${PHOTOS_DIR:-./photos}:/photos:ro
      # 收藏目录
      - ${FAVORITES_DIR:-./favorites}:/favorites
      # 回收站目录
      - ${RECYCLE_DIR:-./recycle}:/recycle
      # 数据库持久化
      - ./data/db:/app/db
      # 缩略图持久化
      - ./data/thumbnails:/app/data/thumbnails
    environment:
      - HOST=0.0.0.0
      - PORT=8082
      - DB_DIR=/app/db
      - PHOTOS_DIR=/photos
      - STAR_DIR=/favorites
      - RECYCLE_DIR=/recycle
      - NAS_HOST_DIR=${NAS_HOST_DIR:-/nas/host}
      - DEFAULT_BLACKLIST_DURATION=${BLACKLIST_DURATION:-3y}
      - ENABLE_DUPLICATE_FILTER=${ENABLE_DUPLICATE_FILTER:-true}
