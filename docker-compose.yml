version: '3.8'

services:
  photo-sorter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo-sorter
    restart: always
    network_mode: bridge
    ports:
      - "8082:8082"
    volumes:
      # 挂载 NAS 根目录到容器（用户在应用设置页面配置具体子目录路径）
      - /:/nas/host
      # 数据库持久化
      - ./data/db:/app/db
      # 缩略图持久化（存放在VOL2，不占VOL1空间）
      - ./data/thumbnails:/app/data/thumbnails
    environment:
      - HOST=0.0.0.0
      - PORT=8082
      - DB_DIR=/app/db
      - DEFAULT_BLACKLIST_DURATION=3y
      - ENABLE_DUPLICATE_FILTER=true
